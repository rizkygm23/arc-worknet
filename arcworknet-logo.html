<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcWorkNet Logo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
    
    :root {
      --cyan: #22d3ee;
      --orange: #f97316;
    }
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .font-display {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo-container {
      width: 1024px;
      height: 1024px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    .hex-grid {
      background-image: 
        linear-gradient(#1f2937 1px, transparent 1px),
        linear-gradient(90deg, #1f2937 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.15;
    }

    .node {
      animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .connection {
      stroke: #22d3ee;
      stroke-opacity: 0.4;
      stroke-width: 2;
    }

    .gradient-text {
      background: linear-gradient(90deg, #22d3ee, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glow-cyan {
      box-shadow: 0 0 20px rgb(34 211 238 / 0.3);
    }
  </style>
</head>
<body class="bg-zinc-950 flex items-center justify-center min-h-screen">
  <!-- Logo Container - 1024x1024 -->
  <div class="logo-container flex flex-col items-center justify-center rounded-3xl shadow-2xl border border-white/10" id="logo">
    
    <!-- Background Effects -->
    <div class="absolute inset-0 hex-grid"></div>
    <div class="absolute inset-0 bg-[radial-gradient(#1f2937_0.8px,transparent_1px)] bg-[length:4px_4px]"></div>
    
    <!-- Central Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[420px] h-[420px] rounded-full bg-cyan-500/10 blur-[120px]"></div>
    
    <!-- Main Content -->
    <div class="relative z-10 flex flex-col items-center">
      
      <!-- Icon: Network + Handshake -->
      <div class="relative mb-8">
        <svg width="280" height="280" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer Hexagon Ring -->
          <path d="M140 20 L220 60 L220 140 L140 180 L60 140 L60 60 Z" 
                stroke="#22d3ee" stroke-width="3" stroke-opacity="0.6"/>
          <path d="M140 40 L200 70 L200 130 L140 160 L80 130 L80 70 Z" 
                stroke="#f97316" stroke-width="2" stroke-opacity="0.5"/>
          
          <!-- Central Nodes -->
          <!-- Center Node -->
          <circle cx="140" cy="100" r="18" fill="#0a0a0a" stroke="#22d3ee" stroke-width="3"/>
          <circle cx="140" cy="100" r="10" fill="#22d3ee"/>
          
          <!-- Left Node (Human) -->
          <circle cx="80" cy="70" r="14" fill="#0a0a0a" stroke="#f97316" stroke-width="3"/>
          <circle cx="80" cy="70" r="8" fill="#f97316"/>
          <!-- Human head icon -->
          <circle cx="80" cy="66" r="4" fill="#0a0a0a"/>
          <path d="M74 76 Q80 82 86 76" stroke="#0a0a0a" stroke-width="2"/>
          
          <!-- Right Node (AI Agent) -->
          <circle cx="200" cy="130" r="14" fill="#0a0a0a" stroke="#22d3ee" stroke-width="3"/>
          <circle cx="200" cy="130" r="8" fill="#22d3ee"/>
          <!-- AI circuit lines -->
          <path d="M194 124 L206 124 M200 118 L200 130 M194 136 L206 136" 
                stroke="#0a0a0a" stroke-width="2"/>
          
          <!-- Connection Lines -->
          <line x1="92" y1="78" x2="122" y2="92" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.6"/>
          <line x1="158" y1="108" x2="186" y2="122" stroke="#f97316" stroke-width="2" stroke-opacity="0.6"/>
          
          <!-- Small floating nodes -->
          <circle cx="110" cy="50" r="5" fill="#22d3ee"/>
          <circle cx="175" cy="155" r="5" fill="#f97316"/>
          <circle cx="55" cy="110" r="4" fill="#22d3ee"/>
          <circle cx="225" cy="85" r="4" fill="#f97316"/>
        </svg>
      </div>
      
      <!-- Typography -->
      <div class="text-center">
        <div class="font-display text-[92px] leading-none tracking-[-4.5px] font-semibold text-white mb-1">
          Arc<span class="gradient-text">WorkNet</span>
        </div>
        <div class="text-[15px] tracking-[3px] text-zinc-400 font-medium -mt-1">AGENTIC JOB MARKETPLACE</div>
      </div>
      
    </div>
    
    <!-- Bottom subtle line -->
    <div class="absolute bottom-16 left-1/2 -translate-x-1/2 w-24 h-px bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>
    
  </div>

  <script>
    // Tailwind script
    function initializeTailwind() {
      document.documentElement.style.setProperty('--accent-cyan', '#22d3ee');
      document.documentElement.style.setProperty('--accent-orange', '#f97316');
    }
    
    window.onload = function() {
      initializeTailwind();
      console.log('%c[ArcWorkNet] Logo ready. Screenshot at 1024x1024.', 'color:#22d3ee');
    }
  </script>
</body>
</html>
