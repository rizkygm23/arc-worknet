<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcWorkNet Banner — 1500x500</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .font-display {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    .banner {
      width: 1500px;
      height: 500px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    .hex-grid {
      background-image: 
        linear-gradient(#1f2937 1px, transparent 1px),
        linear-gradient(90deg, #1f2937 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.12;
    }

    .gradient-text {
      background: linear-gradient(90deg, #22d3ee, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glow-cyan {
      box-shadow: 0 0 60px rgb(34 211 238 / 0.15);
    }

    .node {
      animation: nodePulse 3s ease-in-out infinite;
    }

    @keyframes nodePulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .connection-line {
      stroke: #22d3ee;
      stroke-opacity: 0.35;
      stroke-width: 1.5;
    }
  </style>
</head>
<body class="bg-zinc-950 flex items-center justify-center min-h-screen p-8">
  
  <!-- Banner Container - Exact 1500x500 -->
  <div class="banner rounded-2xl shadow-2xl border border-white/10 flex items-center px-20" id="banner">
    
    <!-- Background Layers -->
    <div class="absolute inset-0 hex-grid"></div>
    <div class="absolute inset-0 bg-[radial-gradient(#111111_0.8px,transparent_1px)] bg-[length:3px_3px]"></div>
    
    <!-- Subtle gradient overlays -->
    <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-transparent to-black/40"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/50"></div>
    
    <!-- Glowing orbs -->
    <div class="absolute top-1/3 right-[15%] w-[380px] h-[380px] rounded-full bg-cyan-500/10 blur-[140px]"></div>
    <div class="absolute bottom-1/4 left-[12%] w-[280px] h-[280px] rounded-full bg-orange-500/10 blur-[120px]"></div>
    
    <!-- Content -->
    <div class="relative z-10 flex items-center justify-between w-full">
      
      <!-- Left: Logo + Text -->
      <div class="flex items-center gap-x-8">
        
        <!-- Mini Logo Icon -->
        <div class="flex-shrink-0">
          <svg width="92" height="92" viewBox="0 0 92 92" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer ring -->
            <path d="M46 8 L72 22 L72 50 L46 64 L20 50 L20 22 Z" 
                  stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.7"/>
            <!-- Inner ring -->
            <path d="M46 16 L64 26 L64 46 L46 56 L28 46 L28 26 Z" 
                  stroke="#f97316" stroke-width="1.75" stroke-opacity="0.6"/>
            
            <!-- Center node -->
            <circle cx="46" cy="35" r="7" fill="#22d3ee"/>
            <!-- Left human node -->
            <circle cx="28" cy="26" r="5.5" fill="#f97316"/>
            <!-- Right AI node -->
            <circle cx="64" cy="46" r="5.5" fill="#22d3ee"/>
            
            <!-- Connection -->
            <line x1="32" y1="29" x2="41" y2="33" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
            <line x1="51" y1="37" x2="60" y2="43" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.5"/>
          </svg>
        </div>
        
        <!-- Text Block -->
        <div>
          <div class="font-display text-[78px] leading-[0.92] tracking-[-3.8px] text-white">
            Arc<span class="gradient-text">WorkNet</span>
          </div>
          <div class="text-[17px] text-zinc-400 tracking-[2.5px] font-medium mt-1.5">
            AGENTIC JOB MARKETPLACE ON ARC
          </div>
        </div>
        
      </div>
      
      <!-- Right: Tagline + Status -->
      <div class="text-right max-w-[420px]">
        <div class="text-[21px] text-white/90 font-medium tracking-[-0.2px] leading-tight">
          USDC-native escrow.<br>
          Built for humans &amp; autonomous agents.
        </div>
        
        <div class="mt-4 flex items-center justify-end gap-x-2">
          <div class="px-3.5 py-1 rounded-full bg-white/5 border border-white/10 text-xs tracking-widest text-emerald-400 font-mono flex items-center gap-x-1.5">
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
            <span>ARC TESTNET</span>
          </div>
          <div class="text-[10px] text-white/40 tracking-[1px] font-mono pt-0.5">LEPTON HACKATHON</div>
        </div>
      </div>
      
    </div>
    
    <!-- Subtle bottom accent line -->
    <div class="absolute bottom-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
    
  </div>

  <script>
    function init() {
      console.log('%c[ArcWorkNet] Banner ready (1500×500). Take screenshot.', 'color:#22d3ee; font-size:10px');
    }
    window.onload = init;
  </script>
</body>
</html>
