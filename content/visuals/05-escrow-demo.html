<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escrow Testnet Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>
<body class="bg-[#0A0A0F] text-white p-10">
  <div class="max-w-[1080px] mx-auto">
    <div class="flex items-center justify-between mb-6 px-2">
      <div>
        <div class="font-semibold text-2xl tracking-tight">Testnet Execution</div>
        <div class="text-emerald-400 text-xs flex items-center gap-x-1.5">
          <i class="fa-solid fa-check-circle"></i> 
          <span>CONFIRMED • ARC TESTNET</span>
        </div>
      </div>
      <div class="text-right">
        <div class="text-xs text-[#A1A1AA]">Job #47</div>
        <div class="mono text-sm text-[#00E5FF]">0x3f2a...e7b1</div>
      </div>
    </div>

    <!-- Transaction Flow -->
    <div class="bg-[#111114] border border-[#1F1F25] rounded-3xl p-8">
      <div class="grid grid-cols-4 gap-4">
        
        <div class="text-center">
          <div class="mx-auto w-9 h-9 bg-[#00E5FF] text-black rounded-2xl flex items-center justify-center mb-3">
            <i class="fa-solid fa-plus text-sm"></i>
          </div>
          <div class="font-semibold">Create</div>
          <div class="text-xs text-[#A1A1AA]">2.1s</div>
          <div class="mt-1 text-[10px] px-2 py-px bg-[#1F1F25] rounded inline-block">SUCCESS</div>
        </div>

        <div class="text-center">
          <div class="mx-auto w-9 h-9 bg-[#00E5FF] text-black rounded-2xl flex items-center justify-center mb-3">
            <i class="fa-solid fa-wallet text-sm"></i>
          </div>
          <div class="font-semibold">Fund (250 USDC)</div>
          <div class="text-xs text-[#A1A1AA]">1.8s</div>
          <div class="mt-1 text-[10px] px-2 py-px bg-[#1F1F25] rounded inline-block">SUCCESS</div>
        </div>

        <div class="text-center">
          <div class="mx-auto w-9 h-9 bg-[#00E5FF] text-black rounded-2xl flex items-center justify-center mb-3">
            <i class="fa-solid fa-upload text-sm"></i>
          </div>
          <div class="font-semibold">Submit</div>
          <div class="text-xs text-[#A1A1AA]">3.4s</div>
          <div class="mt-1 text-[10px] px-2 py-px bg-[#1F1F25] rounded inline-block">SUCCESS</div>
        </div>

        <div class="text-center">
          <div class="mx-auto w-9 h-9 bg-emerald-500 text-black rounded-2xl flex items-center justify-center mb-3">
            <i class="fa-solid fa-check text-sm"></i>
          </div>
          <div class="font-semibold">Release</div>
          <div class="text-xs text-[#A1A1AA]">1.9s</div>
          <div class="mt-1 text-[10px] px-2 py-px bg-emerald-900 text-emerald-400 rounded inline-block">COMPLETE</div>
        </div>
      </div>
    </div>

    <div class="flex justify-between items-center text-xs mt-5 px-3 text-[#52525B]">
      <div>Total time: <span class="text-white font-medium">9.2s</span></div>
      <div>Gas paid in USDC • 0 re-orgs</div>
    </div>
  </div>
</body>
</html>
