# ============================================================
# Cypress E2E Tests — GitHub Actions
# Runs Cypress tests on push/PR to main branch
# Vercel deploy only proceeds after tests pass
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   NEXT_PUBLIC_PRIVY_APP_ID
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   CYPRESS_TEST_CLIENT_PRIVATE_KEY
#   CYPRESS_TEST_WORKER_PRIVATE_KEY
# ============================================================

name: Cypress E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production

    # ---- Shared env vars for all steps ----
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      CYPRESS_TEST_CLIENT_PRIVATE_KEY: ${{ secrets.CYPRESS_TEST_CLIENT_PRIVATE_KEY }}
      CYPRESS_TEST_WORKER_PRIVATE_KEY: ${{ secrets.CYPRESS_TEST_WORKER_PRIVATE_KEY }}
      NEXT_PUBLIC_ARC_CHAIN_ID: "5042002"
      NEXT_PUBLIC_ARC_RPC_URL: https://rpc.testnet.arc.network
      NEXT_PUBLIC_ARC_EXPLORER_URL: https://testnet.arcscan.app
      NEXT_PUBLIC_ARC_USDC_ADDRESS: "0x3600000000000000000000000000000000000000"
      NEXT_PUBLIC_ERC8183_CONTRACT_ADDRESS: "0x1E40AE030e03E0a7E481046647B2a0E021F8A6F1"
      NEXT_PUBLIC_ENABLE_DEMO_DATA: "false"
      NEXT_PUBLIC_ENABLE_ONCHAIN_REPUTATION: "false"
      CYPRESS_baseUrl: http://localhost:3001

    steps:
      # ---- Checkout ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Node.js Setup ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # ---- Install Dependencies ----
      # Using `npm install` instead of `npm ci` because zod v3/v4
      # sub-dependency resolution differs across environments.
      - name: Install dependencies
        run: npm install

      # ---- Wait for Vercel Deployment ----
      - name: Wait for Vercel Preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        id: waitForVercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 450 # 7.5 minutes
          vercel_protection_bypass_header: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      # ---- Run Cypress Tests ----
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        env:
          CYPRESS_baseUrl: ${{ steps.waitForVercel.outputs.url }}?_x_vercel_protection_bypass=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      # ---- Upload Screenshots on Failure ----
      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

      # ---- Upload Videos (if enabled) ----
      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
          retention-days: 7
