# ============================================================
# Cypress E2E Tests — GitHub Actions
# Runs Cypress tests on push/PR to main branch
# ============================================================

name: Cypress E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ---- Checkout ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Node.js Setup ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # ---- Install Dependencies ----
      # Using `npm install` instead of `npm ci` because zod v3/v4
      # sub-dependency resolution differs across environments.
      # This matches Vercel's approach.
      - name: Install dependencies
        run: npm install

      # ---- Run Cypress Tests ----
      # Using `next dev` instead of build+start to avoid prerendering
      # errors caused by placeholder env vars (Privy validates app ID
      # during SSG). Dev mode renders pages on-demand, so only visited
      # pages are rendered — landing page tests don't trigger Privy.
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          start: npx next dev -p 3001
          wait-on: "http://localhost:3001"
          wait-on-timeout: 120
          browser: chrome
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_PRIVY_APP_ID: placeholder-privy-id
          NEXT_PUBLIC_ARC_CHAIN_ID: "5042002"
          NEXT_PUBLIC_ARC_RPC_URL: https://rpc.testnet.arc.network
          NEXT_PUBLIC_ARC_EXPLORER_URL: https://testnet.arcscan.app
          NEXT_PUBLIC_ARC_USDC_ADDRESS: "0x3600000000000000000000000000000000000000"
          NEXT_PUBLIC_ERC8183_CONTRACT_ADDRESS: "0xFD9C4D6fe5a770f148C0Cc49Bc293015525BA955"
          NEXT_PUBLIC_ENABLE_DEMO_DATA: "false"
          NEXT_PUBLIC_ENABLE_ONCHAIN_REPUTATION: "false"

      # ---- Upload Screenshots on Failure ----
      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

      # ---- Upload Videos (if enabled) ----
      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
          retention-days: 7
